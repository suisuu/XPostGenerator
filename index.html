<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xシェアリンク生成</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #e1bee7);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h2 {
      margin-bottom: 1.5rem;
      color: #333;
    }

    textarea, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #1da1f2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease, opacity 0.3s ease;
      margin-bottom: 1rem;
    }

    button:hover {
      background: #0d8ddb;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .copy-btn {
      background: #6c63ff;
    }

    .copy-btn:hover {
      background: #5146e1;
    }

    #copy-message {
      font-size: 14px;
      color: #4caf50;
      opacity: 0;
      transition: opacity 0.5s ease;
      height: 1.4em;
      margin-bottom: 1rem;
    }

    #copy-message.show {
      opacity: 1;
    }

    #error-message {
      font-size: 14px;
      color: #f44336;
      margin-bottom: 1rem;
    }

    footer {
      margin-top: 1rem;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>X（Twitter）シェアリンク作成ツール</h2>
    <textarea id="text" rows="4" placeholder="投稿したい文言を入力してください"></textarea>
    <button onclick="generateLink()">✅ シェアリンクを生成</button>
    <input type="text" id="output" readonly placeholder="ここに短縮URLが表示されます" />
    <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">📋 コピーする</button>
    <div id="copy-message">✅ コピーしました！</div>
    <div id="error-message"></div>
    <footer>Made with ❤️ by You</footer>
  </div>

  <script>
    function generateLink() {
      const text = document.getElementById('text').value.trim();
      const output = document.getElementById('output');
      const error = document.getElementById('error-message');
      const msg = document.getElementById('copy-message');

      // リセット
      output.value = '';
      msg.classList.remove('show');
      error.textContent = '';

      if (!text) {
        error.textContent = '⚠️ 投稿文を入力してください';
        return;
      }

      const encodedText = encodeURIComponent(text);
      const fullUrl = `https://twitter.com/intent/tweet?text=${encodedText}`;

      fetch(`https://x.gd/create.php?format=simple&url=${encodeURIComponent(fullUrl)}`)
        .then((res) => {
          if (!res.ok) throw new Error("短縮APIエラー");
          return res.text();
        })
        .then((shortUrl) => {
          output.value = shortUrl;
        })
        .catch((err) => {
          console.error(err);
          error.textContent = '🚫 URL短縮に失敗しました。もう一度お試しください。';
        });
    }

    function copyToClipboard() {
      const output = document.getElementById('output');
      const copyBtn = document.getElementById('copy-btn');
      const msg = document.getElementById('copy-message');

      if (!output.value) return;

      output.select();
      document.execCommand('copy');

      copyBtn.disabled = true;
      msg.classList.add('show');

      setTimeout(() => {
        msg.classList.remove('show');
        copyBtn.disabled = false;
      }, 3000);
    }
  </script>
</body>
</html>
